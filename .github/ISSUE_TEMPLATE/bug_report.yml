name: Bug report
description: Report a bug or regression.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Steps, URLs, payloads, or screenshots that reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Branch, browser, OS, deployment target, and any relevant config notes.
