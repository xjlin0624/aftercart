[build]
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile"

[deploy]
# This start command is for the API service.
# When adding the worker and beat services in the Railway dashboard,
# override the start command for each:
#   worker: celery -A backend.app.workers.celery_app.celery_app worker --loglevel=INFO
#   beat:   celery -A backend.app.workers.celery_app.celery_app beat --loglevel=INFO
startCommand = "bash -lc \"cd backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT\""
healthcheckPath = "/api/health/ready"
